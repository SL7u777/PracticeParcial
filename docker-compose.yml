services:
  mongodb:
    image: mongo:7
    container_name: airline_mongodb
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    environment:
      MONGO_INITDB_DATABASE: airline_db
    networks:
      - airline_network

  backend:
    build: ./backend
    container_name: airline_backend
    ports:
      - "5000:5000"
    environment:
      MONGODB_URI: mongodb://mongodb:27017/airline_db
      PORT: 5000
    depends_on:
      - mongodb
    networks:
      - airline_network
    volumes:
      - ./backend:/app
      - /app/node_modules

  frontend:
    build: ./frontend
    container_name: airline_frontend
    ports:
      - "5173:5173"
    depends_on:
      - backend
    networks:
      - airline_network
    volumes:
      - ./frontend:/app
      - /app/node_modules

networks:
  airline_network:
    driver: bridge

volumes:
  mongo_data:
